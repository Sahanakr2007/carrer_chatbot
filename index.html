<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareerCompass AI</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <div id="stars"></div>
  <div class="orb orb-left"></div>
  <div class="orb orb-right"></div>

  <div class="card">

    <!-- Header -->
    <div class="header">
      <div class="header-icon">🧭</div>
      <div class="header-info">
        <div class="header-title">CareerCompass AI</div>
        <div class="header-subtitle">Your personal career guide ✨</div>
        <div class="header-status">
          <span class="status-dot"></span>
          <span class="status-text">Ready to guide you</span>
        </div>
      </div>
      <div class="header-badge">AI Powered</div>
    </div>

    <!-- Chat area -->
    <div class="chat-area" id="chatArea">
      <div class="typing-indicator" id="typingIndicator" style="display:none;">
        <div class="avatar ai-avatar">🧭</div>
        <div class="typing-bubble">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>

      <div class="suggestions" id="suggestions">
        <div class="suggestions-label">✨ Quick starts — tap one:</div>
        <div class="suggestions-grid" id="suggestionsGrid"></div>
      </div>

      <div id="chatEnd"></div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <textarea id="userInput" placeholder="Share your interests, strengths, or questions..." rows="1"></textarea>
      <button id="sendBtn" disabled>➤</button>
    </div>

    <div class="footer-text">CareerCompass AI • Helping students find their path 🌟</div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
